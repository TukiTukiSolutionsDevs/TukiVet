name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint-test:
    name: Lint + Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tukivet_test
          POSTGRES_USER: tukivet
          POSTGRES_PASSWORD: tukivet
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tukivet -d tukivet_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy app

      - name: Tests
        env:
          DATABASE_URL: postgresql+asyncpg://tukivet:tukivet@localhost:5432/tukivet_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: pytest -q --cov=app --cov-report=term-missing
