name: tukivet

services:
  postgres:
    image: postgres:16-alpine
    container_name: tukivet-postgres
    environment:
      POSTGRES_DB: tukivet
      POSTGRES_USER: tukivet
      POSTGRES_PASSWORD: tukivet_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tukivet -d tukivet"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tukivet-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: quay.io/minio/minio:latest
    container_name: tukivet-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile.dev
    container_name: tukivet-api
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://tukivet:tukivet_dev@postgres:5432/tukivet
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
    ports:
      - "8000:8000"
    volumes:
      - ../apps/api/app:/app/app
      - ../apps/api/alembic:/app/alembic
      - ../apps/api/alembic.ini:/app/alembic.ini
      - ../apps/api/tests:/app/tests
      - ../apps/api/pyproject.toml:/app/pyproject.toml
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  landing:
    image: nginx:1.27-alpine
    container_name: tukivet-landing
    ports:
      - "4280:80"
    volumes:
      - ../apps/landing:/usr/share/nginx/html:ro
      - ../apps/landing/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: tukivet-web
    ports:
      - "3100:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  pgdata:
  miniodata:
