# Producción VPS — integrado con el gateway global (nginx-proxy + acme-companion)
# que ya corre en /root/infra/gateway. La red `web` es external.
#
# .env.prod requerido:
#   POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD
#   MINIO_ROOT_USER, MINIO_ROOT_PASSWORD
#   SECRET_KEY
#   LANDING_HOST   (ej. tukifact.net.pe,www.tukifact.net.pe)
#   APP_HOST       (ej. app.tukifact.net.pe)
#   API_HOST       (ej. api.tukifact.net.pe)
#   LETSENCRYPT_EMAIL

name: razas

services:
  postgres:
    image: postgres:16-alpine
    container_name: razas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tukivet}
      POSTGRES_USER: ${POSTGRES_USER:-tukivet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      TZ: America/Lima
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tukivet} -d ${POSTGRES_DB:-tukivet}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: razas-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - internal

  minio:
    image: minio/minio:latest
    container_name: razas-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      TZ: America/Lima
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - internal

  minio-init:
    image: minio/mc:latest
    container_name: razas-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/razas-prod;
      exit 0;
      "
    networks:
      - internal

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    image: razas/api:latest
    container_name: razas-api
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tukivet}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tukivet}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ACCESS_TOKEN_MINUTES: "15"
      REFRESH_TOKEN_DAYS: "7"
      CORS_ORIGINS: https://${LANDING_HOST_PRIMARY},https://${APP_HOST}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: razas-prod
      S3_REGION: us-east-1
      SAFE_RECIPIENTS_ONLY: "false"
      TZ: America/Lima
      # nginx-proxy + acme-companion
      VIRTUAL_HOST: ${API_HOST}
      VIRTUAL_PORT: "8000"
      LETSENCRYPT_HOST: ${API_HOST}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - web
      - internal

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    image: razas/web:latest
    container_name: razas-web
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://${API_HOST}
      TZ: America/Lima
      VIRTUAL_HOST: ${APP_HOST}
      VIRTUAL_PORT: "3000"
      LETSENCRYPT_HOST: ${APP_HOST}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - web

  landing:
    build:
      context: ../apps/landing
      dockerfile: Dockerfile
    image: razas/landing:latest
    container_name: razas-landing
    restart: unless-stopped
    expose:
      - "80"
    environment:
      VIRTUAL_HOST: ${LANDING_HOST}
      VIRTUAL_PORT: "80"
      LETSENCRYPT_HOST: ${LANDING_HOST}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - web

volumes:
  pgdata:
  redisdata:
  miniodata:

networks:
  web:
    external: true
  internal:
    driver: bridge
